name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write      # push git tags, create GitHub Releases
  id-token: write      # OIDC token for npm trusted publishing + provenance

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.compare.outputs.should_publish }}
      local_version: ${{ steps.compare.outputs.local_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare local version with npm registry
        id: compare
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @pruddiman/dispatch version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION npm=$NPM_VERSION"
          SHOULD_PUBLISH=$(node -e "
            const [lM, lm, lp] = '${LOCAL_VERSION}'.split('.').map(Number);
            const [nM, nm, np] = '${NPM_VERSION}'.split('.').map(Number);
            const gt = lM > nM || (lM === nM && lm > nm) || (lM === nM && lm === nm && lp > np);
            console.log(gt ? 'true' : 'false');
          ")
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No registry-url: setting it writes an .npmrc with NODE_AUTH_TOKEN
          # substitution that breaks npm OIDC trusted publishing auth

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create git tag
        run: |
          git tag "v${{ needs.check-version.outputs.local_version }}"
          git push origin "v${{ needs.check-version.outputs.local_version }}"

      - name: Create GitHub Release
        run: gh release create "v${{ needs.check-version.outputs.local_version }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write      # push git tags, create GitHub Releases
  issues: write        # semantic-release comments on closed issues
  pull-requests: write # semantic-release comments on merged PRs
  id-token: write      # OIDC token for npm trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # semantic-release needs full history to compute next version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No registry-url: setting it writes an .npmrc with NODE_AUTH_TOKEN
          # substitution that breaks npm OIDC trusted publishing auth

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NODE_AUTH_TOKEN — npm OIDC handles auth via id-token: write above

name: Publish

# Trigger on pushes to main (to prepare a release PR) and when a PR targeting
# main is closed (to publish after the release PR is merged).
on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  # ── Detect whether this run is triggered by merging the release PR ──────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      is-release-merge: ${{ steps.check.outputs.is-release-merge }}
    steps:
      - name: Check if release PR merge
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          IS_RELEASE_MERGE=false
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$PR_MERGED" == "true" ]] && [[ "$PR_HEAD_REF" == "release/next" ]]; then
              IS_RELEASE_MERGE=true
            fi
          else
            # For push events, skip PR preparation when the commit originates
            # from a merged release PR (regular merge, squash, or rebase).
            # Regular merge:  "Merge pull request #N from <owner>/release/next"
            # Squash/rebase:  "chore(release): <version>"
            if [[ "$HEAD_COMMIT_MSG" == chore\(release\):* ]] || \
               [[ "$HEAD_COMMIT_MSG" == *"/release/next" ]]; then
              IS_RELEASE_MERGE=true
            fi
          fi
          echo "is-release-merge=$IS_RELEASE_MERGE" >> "$GITHUB_OUTPUT"

  # ── Create or update a release PR when release-worthy commits land on main ──
  # semantic-release (PR mode) updates CHANGELOG.md and package.json version
  # without pushing to git or publishing to npm.  peter-evans/create-pull-request
  # then opens/updates a PR from the dedicated release/next branch.
  prepare-release-pr:
    needs: detect
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect.outputs.is-release-merge == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Run semantic-release in PR-preparation mode (.releaserc.json has
      # npmPublish:false and no @semantic-release/git, so it only updates
      # CHANGELOG.md and package.json — no git push, no npm publish).
      - name: Prepare release files
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get next version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Create or update the release PR.  Only CHANGELOG.md, package.json, and
      # package-lock.json are committed; other working-tree changes are ignored.
      # If no release-worthy commits were found, semantic-release leaves files
      # unchanged and this step is a no-op (no PR created/updated).
      - name: Create or update release PR
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/next
          delete-branch: true  # delete release/next after the PR is merged
          add-paths: |
            CHANGELOG.md
            package.json
            package-lock.json
          commit-message: "chore(release): ${{ steps.version.outputs.version }}"
          title: "chore(release): ${{ steps.version.outputs.version }}"
          body: |
            🤖 This pull request was automatically generated by the release workflow.

            It contains the changelog and version updates for the next release.

            **Merging this PR will complete the version/changelog update.**
            After merging, the package will be published to npm and a GitHub Release
            will be created automatically.
          labels: release

      - name: Summary
        if: steps.pr.outputs.pull-request-url != ''
        run: echo "Release PR opened/updated at ${{ steps.pr.outputs.pull-request-url }}"

  # ── Publish to npm and create a GitHub Release when the release PR is merged ─
  publish:
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.is-release-merge == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
